<mat-card class="example-card">
  <mat-card-header>
    <div mat-card-avatar class="example-header-image"></div>
    <mat-card-title *ngIf="user">{{ user.name }}</mat-card-title>
    <mat-card-subtitle *ngIf="user">{{ user.age }}</mat-card-subtitle>
    <mat-card-subtitle *ngIf="user">{{ user.email }}</mat-card-subtitle>
  </mat-card-header>
</mat-card>
